<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html {
            font: 5vw Montserrat, "微软雅黑", sans-serif;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            color: #333;
        }

        #btnClk {
            border: .1em solid #333;
            padding: 0.5em;
            border-radius: 1em;
            transition: 0.25s;
        }

        #btnClk:hover {
            background: #333;
            color: #fff;
        }
    </style>
    <link href="https://fonts.font.im/css?family=Roboto:400|Montserrat:700i" rel="stylesheet">
    <title>10000 Clk</title>
</head>

<body>
    <p><span id="numClk">0</span> / 10000 Finished</p>
    <span id="btnClk" onclick="updClk()">CLICK ME</div>
</body>
<script>
    onload = function () { numClk = 0 };
    onselectstart = function () { return false; }
    function updClk(times) {
        times ? numClk += times : numClk += 1;
        numClk == 1e4 ? alert("Finished!\nqqgroup{894656456}") : document.getElementById("numClk").innerHTML = numClk;
    }
</script>

</html>
